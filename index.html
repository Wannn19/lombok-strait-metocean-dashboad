<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Data Viewer - Final Fix (Grid Rose Sync)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        :root {
            /* Warna default (akan di-override oleh JS) */
            --neon-color: #00C2FF;  
            --neon-glow: rgba(0, 194, 255, 0.4);
            
            --bg-dark: #0b0b0b;
            --panel-bg: #141414;
            --text-color: #e0e0e0;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 50px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #111; flex-shrink: 0; z-index: 2000; }
        .brand h1 { margin: 0; font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
        .brand span { color: #888; font-size: 11px; font-weight: 400; margin-left: 10px; }

        .controls-area { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; padding-right: 20px; }

        /* INPUT SELECTOR STYLE */
        .var-select {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
        }
        .var-select:hover { border-color: var(--neon-color); }

        .stats-row { display: flex; gap: 20px; }
        .stat-item { text-align: right; display: flex; align-items: center; gap: 8px; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: 700; font-family: 'Roboto Mono', monospace; }

        /* LAYOUT 50% - 50% */
        .main-content { 
            flex: 1; 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 50% 50% Split */
            gap: 10px; 
            padding: 10px; 
            height: calc(100vh - 50px); 
            box-sizing: border-box; 
            overflow: hidden; 
        }

        /* PANEL KIRI (PETA) */
        .left-panel { 
            display: flex; flex-direction: column; gap: 10px; height: 100%; min-height: 0; 
            order: 1; 
        }

        /* PANEL KANAN (DATA) */
        .right-panel { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            padding: 20px 30px; 
            justify-content: flex-start; 
            background: var(--bg-dark); 
            height: 100%;
            order: 2; 
            overflow-y: auto; 
            box-sizing: border-box;
        }

        /* CHART ASPECT RATIO 2:1 */
        .chart-container { 
            flex: 0 0 auto; 
            width: 100%; 
            aspect-ratio: 2 / 1; 
            max-height: 45vh; 
            background: var(--panel-bg); 
            border: 1px solid #2a2a2a; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; 
        }

        /* CONTROLS (BUTTONS) */
        .controls-container { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            flex: 0 0 auto; 
            width: 100%;
        }
        
        .sub-mode-controls { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            background: var(--panel-bg); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .sm-btn { background: transparent; border: 1px solid #444; color: #888; padding: 6px 12px; font-size: 10px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .sm-btn:hover { border-color: #666; color: #ccc; }
        .sm-btn.active { background: var(--neon-color); border-color: var(--neon-color); color: #000; box-shadow: 0 0 10px var(--neon-glow); }
        
        .cmp-btn.active { background: #fff; border-color: #fff; color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* BOTTOM ROW SPLIT (50% Wind Rose | 50% Stats) */
        .bottom-row { 
            flex: 1; 
            min-height: 180px; 
            width: 100%; 
            margin-bottom: 0;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
        }

        .rose-container {
            background: var(--panel-bg);
            border: 1px solid #333;
            border-radius: 12px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        #roseImage { width: 95%; height: 95%; object-fit: contain; display: block; }

        .new-stats-container { 
            background: transparent; border: none; overflow: visible; 
            display: flex; flex-direction: column; justify-content: center;
        }
        .stats-content-box { width: 100%; height: 100%; }
        
        .stat-group { 
            background: var(--panel-bg); border: 1px solid #333; border-radius: 12px; 
            padding: 20px; display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 100%; height: 100%; 
            box-sizing: border-box; transition: transform 0.2s; 
        }
        .stat-group:hover { border-color: #555; }
        .sg-title { font-size: 14px; font-weight: 700; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; color: var(--neon-color); }
        .sg-row { font-size: 13px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .sg-row:last-child { border-bottom: none; }
        .sg-label { color: #888; font-weight: 500; }
        .sg-val { font-size: 18px; font-weight: 700; color: #fff; font-family: 'Roboto Mono', monospace; }

        .chart-header { padding: 8px 12px; border-bottom: 1px solid #222; font-size: 11px; font-weight: 600; color: #888; display: flex; justify-content: space-between; align-items: center; }
        .legend-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        
        .canvas-wrapper { flex: 1; position: relative; width: 100%; cursor: crosshair; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        .spatial-panel { flex: 1; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 4px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .spatial-header { padding: 6px 10px; border-bottom: 1px solid #222; font-size: 10px; font-weight: 600; color: #888; display: flex; justify-content: space-between; background: var(--panel-bg); flex-shrink: 0; z-index: 1001; position: relative; }
        .spatial-main { flex: 1; position: relative; min-height: 0; }
        
        #map { width: 100%; height: 100%; background: var(--bg-dark); position: absolute; top: 0; left: 0; z-index: 1;}
        
        /* 3D Container */
        #map3d-container { width: 100%; height: 100%; background: #000; position: absolute; top: 0; left: 0; z-index: 0; display: none; }

        .coord-display { position: absolute; bottom: 10px; left: 10px; background: rgba(15, 15, 15, 0.85); border: 1px solid #444; padding: 4px 8px; border-radius: 4px; color: #e0e0e0; font-family: 'Roboto Mono', monospace; font-size: 10px; z-index: 1005; pointer-events: none; display: none; backdrop-filter: blur(2px); }

        .colorbar-container { position: absolute; bottom: 20px; right: 10px; background: transparent; padding: 0; z-index: 1002; display: none; flex-direction: column; align-items: center; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .colorbar-img { max-height: 250px; width: auto; display: block; }

        /* BUTTON STYLES ADAPTED FOR COMPATIBILITY */
        .map-toggle-btn { position: absolute; top: 10px; right: 10px; z-index: 1005; background: rgba(20, 20, 20, 0.9); color: #ccc; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 600; transition: all 0.2s ease; backdrop-filter: blur(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .map-toggle-btn:hover { background: #333; color: #fff; }

        #viewToggleBtn { position: absolute; top: 45px; right: 10px; z-index: 1005; background: rgba(20, 20, 20, 0.9); color: #ccc; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 600; transition: all 0.3s ease; backdrop-filter: blur(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #viewToggleBtn:hover { background: #333; color: #fff; }
        #viewToggleBtn.spatial-active { background: linear-gradient(90deg, #1fa2ff 0%, #12d8fa 100%); border: none; color: #000; box-shadow: 0 0 10px rgba(18, 216, 250, 0.5); }

        /* 3D Button Style (Added below viewToggle) */
        #threedToggleBtn { position: absolute; top: 80px; right: 10px; z-index: 1005; background: rgba(20, 20, 20, 0.9); color: #ccc; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 600; transition: all 0.3s ease; backdrop-filter: blur(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #threedToggleBtn:hover { background: #333; color: #fff; }
        #threedToggleBtn.active-3d { background: linear-gradient(90deg, #FF4D4D 0%, #F9CB28 100%); border: none; color: #000; box-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }

        /* 3D Controls */
        .threed-controls {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            z-index: 1006; display: none; gap: 5px;
            background: rgba(20, 20, 20, 0.8); padding: 5px; border-radius: 8px; border: 1px solid #444;
        }
        .threed-btn {
            background: transparent; border: 1px solid #555; color: #aaa; padding: 4px 10px; 
            font-size: 10px; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-weight: 600;
        }
        .threed-btn.active { background: var(--neon-color); color: #000; border-color: var(--neon-color); }


        #tooltip { position: absolute; display: none; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 8px 12px; border-radius: 4px; pointer-events: none; color: #eee; z-index: 2005; font-size: 11px; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; color: #fff; font-size: 12px; }

        @keyframes neonPulse { 0% { filter: drop-shadow(0 0 2px inherit); opacity: 0.7; } 50% { filter: drop-shadow(0 0 10px inherit); opacity: 1; } 100% { filter: drop-shadow(0 0 2px inherit); opacity: 0.7; } }
        .neon-center-path { stroke: var(--neon-color); stroke-width: 3px; fill: var(--neon-color); fill-opacity: 0.6; filter: drop-shadow(0 0 6px var(--neon-color)); transform-box: fill-box; transform-origin: center; transform: scale(1.15); animation: neonPulse 2s infinite ease-in-out; z-index: 500; }
        .neon-neighbor-path { stroke: #999; stroke-width: 1.5px; fill: var(--neon-color); fill-opacity: 0.3; filter: drop-shadow(0 0 3px var(--neon-color)); transform-box: fill-box; transform-origin: center; transform: scale(1.05); animation: neonPulse 2s infinite ease-in-out; animation-delay: 0.2s; z-index: 499; }
        .grid-cell-path { transition: stroke 0.1s, fill-opacity 0.1s, transform 0.2s; }
        .chart-locked { cursor: default !important; }

        .cursor-ns { cursor: ns-resize !important; }
        .cursor-ew { cursor: ew-resize !important; }
        .maplibregl-ctrl-bottom-right { display: none; }
    </style>
</head>

<script>
    const DATA_SOURCES = {
        swh: { 
            url: 'data/wave_data_swh_rose.json', // DISUNTIK: Menggunakan output backend swh v2 terbaru
            label: 'SIG. WAVE HEIGHT', unit: 'm', short: 'SWH', desc: 'm (meters)', 
            color: '#00C2FF', fillTop: 'rgba(0, 194, 255, 0.4)', fillBottom: 'rgba(0, 194, 255, 0.0)',
            // 3D Config
            heightScale: 30000, offset: 50, cmap: 'YlGnBu'
        },
        mwp: { 
            url: 'data/wave_data_mwp.json', label: 'MEAN WAVE PERIOD', unit: 's', short: 'MWP', desc: 's (seconds)', 
            color: '#D600FF', fillTop: 'rgba(214, 0, 255, 0.4)', fillBottom: 'rgba(214, 0, 255, 0.0)',
            // 3D Config
            heightScale: 10000, offset: 50, cmap: 'Viridis'
        },
        wind: { 
            url: 'data/wind_data_images.json', label: 'WIND SPEED', unit: 'm/s', short: 'WIND', desc: 'm/s (meters/second)', 
            color: '#FF9E00', fillTop: 'rgba(255, 158, 0, 0.4)', fillBottom: 'rgba(255, 158, 0, 0.0)',
            // 3D Config
            heightScale: 8000, offset: 50, cmap: 'Inferno'
        }
    };

    // --- [MANUAL COLORMAP INTERPOLATION FOR 3D] ---
    const CMAP_YLGNBU = [{pos:0.0,color:[255,255,217]},{pos:0.35,color:[65,182,196]},{pos:0.65,color:[34,94,168]},{pos:1.0,color:[8,29,88]}];
    const CMAP_VIRIDIS = [{pos:0.0,color:[68,1,84]},{pos:0.3,color:[49,104,142]},{pos:0.6,color:[53,183,121]},{pos:1.0,color:[253,231,37]}];
    const CMAP_INFERNO = [{pos:0.0,color:[0,0,4]},{pos:0.25,color:[87,16,110]},{pos:0.5,color:[188,55,84]},{pos:0.75,color:[249,142,9]},{pos:1.0,color:[252,255,164]}];

    function interpolateColor(value, min, max, scheme) {
        let t = (value - min) / (max - min); t = Math.max(0, Math.min(1, t));
        let lower = scheme[0]; let upper = scheme[scheme.length - 1];
        for (let i = 0; i < scheme.length - 1; i++) { if (t >= scheme[i].pos && t <= scheme[i+1].pos) { lower = scheme[i]; upper = scheme[i+1]; break; } }
        const range = upper.pos - lower.pos; const localT = (t - lower.pos) / range;
        const r = Math.round(lower.color[0] + (upper.color[0] - lower.color[0]) * localT);
        const g = Math.round(lower.color[1] + (upper.color[1] - lower.color[1]) * localT);
        const b = Math.round(lower.color[2] + (upper.color[2] - lower.color[2]) * localT);
        return [r, g, b];
    }

    function getComplexColor(val, min, max, type) {
        if (type === 'YlGnBu') return interpolateColor(val, min, max, CMAP_YLGNBU);
        if (type === 'Viridis') return interpolateColor(val, min, max, CMAP_VIRIDIS);
        if (type === 'Inferno') return interpolateColor(val, min, max, CMAP_INFERNO);
        return [200, 200, 200];
    }
    
    let currentVar = 'swh'; 
    const THEME = { grid: '#222', text: '#555', crosshair: '#fff' };

    let fullChartData = []; 
    let gridJsonData = null; 
    let gridSubMode = 'ts'; 
    let viewMode = 'grid';  

    // SUNTIKAN: State Box Plot
    let chartMode = 'line'; 
    let boxplotJsonData = null; 
    let boxplotChartData = []; // [[min, q1, med, q3, max], ...]

    // 3D MODE STATES
    let is3DMode = false; 
    let is3DGridSelector = false; 
    let hoveredGrid3D = null; // Store [row, col]
    let raf3D_Lock = null; // Anti-Lag Lock

    let hoverIndex = -1;
    let isChartLocked = false;
    let lockedHoverIndex = -1; 

    let gridRects = {}; 
    let activeHighlights = []; 
    let isGridLocked = false;  
    let lockedGridKey = null;  
    let currentGridRow = -1;
    let currentGridCol = -1;

    let zoomState = { yMin: null, yMax: null, yMinSec: null, yMaxSec: null, xStartIdx: 0, xEndIdx: 0, isYManual: false, isYManualSec: false, isXManual: false };
    let isZoomingY_Pri = false; 
    let isZoomingY_Sec = false; 
    let isZoomingX = false;
    let lastMouseY = 0;
    let lastMouseX = 0;

    let compareVar = 'none'; 
    let secondaryJsonData = null; 
    let secondaryChartData = [];  
    const dataCache = {}; 
    
    const cvsCombined = document.getElementById('canvasCombined');
    const ctxCombined = cvsCombined.getContext('2d');
    const wrapper = document.getElementById('chartWrapper');
    const tooltip = document.getElementById('tooltip');
    const coordDisplay = document.getElementById('coordDisplay');
    const btnMapToggle = document.getElementById('mapToggleBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const smBtns = document.querySelectorAll('.sm-btn');
    const viewToggleBtn = document.getElementById('viewToggleBtn');
    // 3D Controls
    const threedToggleBtn = document.getElementById('threedToggleBtn');
    const threedControls = document.getElementById('threedControls');
    const mode3dGlobal = document.getElementById('mode3dGlobal');
    const mode3dGrid = document.getElementById('mode3dGrid');

    const mapTitle = document.getElementById('mapTitle');
    const colorbarLegend = document.getElementById('colorbarLegend');
    const spatialTimeLabel = document.getElementById('spatialTimeLabel');
    const varSelect = document.getElementById('varSelect'); 
    
    // SUNTIKAN: Selector Event
    const modeSelect = document.getElementById('modeSelect');
    modeSelect.addEventListener('change', (e) => {
        chartMode = e.target.value;
        if (chartMode === 'boxplot' && compareVar !== 'none') {
            alert("Overlay dinonaktifkan pada Mode Box Plot.");
            compareVar = 'none';
            document.querySelectorAll('.cmp-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-cmp="none"]').classList.add('active');
            secondaryChartData = [];
        }
        resetZoom();
        if (viewMode === 'spatial' || is3DMode) loadAreaAverageData();

    let resizeObserver = null;

    btnMapToggle.addEventListener('click', () => {

        isSatellite = !isSatellite; spatialOverlay.bringToFront(); if(landLayer) landLayer.bringToFront(); if(viewMode === 'grid') gridLayerGroup.eachLayer(l => l.bringToFront());
    });

    map.on('mousemove', function(e) { coordDisplay.style.display = 'block'; coordDisplay.innerText = `LAT: ${e.latlng.lat.toFixed(4)} | LON: ${e.latlng.lng.toFixed(4)}`; });

    // --- 3D MAP SETUP (DECK.GL) ---

    function init3DMap() {

        const centerLon = (imageBounds[0][1] + imageBounds[1][1]) / 2;
        
        deckgl = new deck.DeckGL({

    function update3DLayer(timeIndex) {
        if (!is3DMode || !gridJsonData || !deckgl) return;
        
        let maxLen = 0;
        if (gridSubMode === 'ts') maxLen = gridJsonData.metadata.labels_ts.length;
        else if (gridSubMode === 'clim') maxLen = 12;
        else if (gridSubMode === 'seas') maxLen = 4;
        
        if (timeIndex >= maxLen) timeIndex = 0;

        const conf = DATA_SOURCES[currentVar];
        const lats = gridJsonData.metadata.latitudes;
        const lons = gridJsonData.metadata.longitudes;
        
        let minVal = 0, maxVal = 5;
        if(gridJsonData.metadata.color_ranges && gridJsonData.metadata.color_ranges[gridSubMode]) {
            minVal = gridJsonData.metadata.color_ranges[gridSubMode][0];
            maxVal = gridJsonData.metadata.color_ranges[gridSubMode][1];
        }

        let data3d = [];
        lats.forEach((lat, r) => {
            lons.forEach((lon, c) => {
                const key = `${r},${c}`;
                const cellData = gridJsonData.grid_data[key];
                if(cellData) {
                    let val = null;
                    if(gridSubMode === 'ts' && cellData.ts && cellData.ts[timeIndex] != null) val = cellData.ts[timeIndex];
                    else if(gridSubMode === 'clim' && cellData.clim && cellData.clim[timeIndex] != null) val = cellData.clim[timeIndex];
                    else if(gridSubMode === 'seas' && cellData.seas && cellData.seas[timeIndex] != null) val = cellData.seas[timeIndex];
                    
                    if (val !== null) data3d.push({ position: [lon, lat], value: val, idx: [r, c] });
                }
            });
        });

        const gridFloorLayer = new deck.ColumnLayer({
            id: 'grid-floor',
            data: data3d,
            diskResolution: 4,
            radius: 6500,
            angle: 45,
            extruded: false, 
            pickable: is3DGridSelector, 
            elevationScale: 0,
            getPosition: d => d.position,
            getFillColor: [30, 30, 30, 255], 
            getLineColor: [80, 80, 80, 200], 
            lineWidthMinPixels: 1,
            stroked: true,
            filled: true
        });

        const mainColumnLayer = new deck.ColumnLayer({
            id: 'column-layer',
            data: data3d,
            diskResolution: 4, 
            radius: 6500, 
            angle: 45, 
            extruded: true,
            wireframe: true, 
            pickable: true,
            elevationScale: conf.heightScale,
            getPosition: d => d.position,
            
            getElevation: d => {
                if (is3DGridSelector) {
                    let inHoverRange = false;
                    if (hoveredGrid3D) {
                        const [hR, hC] = hoveredGrid3D;
                        if (Math.abs(d.idx[0] - hR) <= 1 && Math.abs(d.idx[1] - hC) <= 1) inHoverRange = true;
                    }
                    let inLockRange = false;
                    if (isGridLocked && lockedGridKey) {
                        const [lR, lC] = lockedGridKey.split(',').map(Number);
                        if (Math.abs(d.idx[0] - lR) <= 1 && Math.abs(d.idx[1] - lC) <= 1) inLockRange = true;
                    }
                    if (inHoverRange || inLockRange) return Math.max(0, d.value + 0.1);
                    return 0; 
                }
                return Math.max(0, d.value + 0.1); 
            },

            getFillColor: d => {
                const rgb = getComplexColor(d.value, minVal, maxVal, conf.cmap);
                if (is3DGridSelector) {
                    let inHoverRange = false;
                    if (hoveredGrid3D) {
                        const [hR, hC] = hoveredGrid3D;
                        if (Math.abs(d.idx[0] - hR) <= 1 && Math.abs(d.idx[1] - hC) <= 1) inHoverRange = true;
                    }
                    let inLockRange = false;
                    if (isGridLocked && lockedGridKey) {
                        const [lR, lC] = lockedGridKey.split(',').map(Number);
                        if (Math.abs(d.idx[0] - lR) <= 1 && Math.abs(d.idx[1] - lC) <= 1) inLockRange = true;
                    }
                    if (inHoverRange || inLockRange) return [...rgb, 200];
                    else return [0,0,0,0];
                }
                return [...rgb, 200];
            },
            
            getLineColor: d => {
                 const rgb = getComplexColor(d.value, minVal, maxVal, conf.cmap);
                 if (is3DGridSelector) {
                    let inHoverRange = false;
                    if (hoveredGrid3D) {
                        const [hR, hC] = hoveredGrid3D;
                        if (Math.abs(d.idx[0] - hR) <= 1 && Math.abs(d.idx[1] - hC) <= 1) inHoverRange = true;
                    }
                    let inLockRange = false;
                    if (isGridLocked && lockedGridKey) {
                        const [lR, lC] = lockedGridKey.split(',').map(Number);
                        if (Math.abs(d.idx[0] - lR) <= 1 && Math.abs(d.idx[1] - lC) <= 1) inLockRange = true;
                    }
                    if (inHoverRange || inLockRange) return [rgb[0], rgb[1], rgb[2], 255];
                    else return [0,0,0,0];
                 }
                 return [rgb[0], rgb[1], rgb[2], 255]; 
            },
            lineWidthMinPixels: 2, 
            material: {
                ambient: 1.0,    
                diffuse: 0.0,    
                shininess: 0,    
                specularColor: [0, 0, 0] 
            },
            updateTriggers: {
                getElevation: [is3DGridSelector, hoveredGrid3D, isGridLocked, lockedGridKey],
                getFillColor: [is3DGridSelector, hoveredGrid3D, isGridLocked, lockedGridKey],
                getLineColor: [is3DGridSelector, hoveredGrid3D, isGridLocked, lockedGridKey]
            },
            transitions: {
                getElevation: 150,
                getFillColor: 150,
                getLineColor: 150
            }
        });

        deckgl.setProps({ layers: [gridFloorLayer, mainColumnLayer] });
    }

    // --- 3D MODE TOGGLES ---
    mode3dGlobal.addEventListener('click', () => {

    viewToggleBtn.addEventListener('click', () => {

    function updateColorbarImage() {
        if (!gridJsonData) return;
        let path = "";
        
        if (gridJsonData.metadata && gridJsonData.metadata.colorbar) { 
            const cb = gridJsonData.metadata.colorbar; 
            path = (typeof cb === 'object') ? cb[gridSubMode] : cb; 
        } 
        else if (gridJsonData.metadata.colorbar_paths) { 
            path = gridJsonData.metadata.colorbar_paths[gridSubMode]; 
        }

        if (currentVar === 'wind' && path && !path.includes('/')) {
            path = `frames_wind_final/map/${gridSubMode}/${path}`;
        }

        // Perbaikan: Tambahkan folder induk 'frames/' dan pastikan format .webp
        if (path) {
            // Jika path belum memiliki format .webp, kita ganti secara manual
            let finalPath = 'frames/' + path.replace('.png', '.webp');
            colorbarLegend.innerHTML = `<img src="${finalPath}" class="colorbar-img" alt="Legend">`;
        } else {
            colorbarLegend.innerHTML = "";
        }
    }

    
    function loadAreaAverageData() {
        if (!gridJsonData || !gridJsonData.area_average) return;

        const aaData = gridJsonData.area_average;
        let rawVals, rawLabels;
        if (gridSubMode === 'ts') { rawVals = aaData.ts; rawLabels = gridJsonData.metadata.labels_ts; } 
        else if (gridSubMode === 'clim') { rawVals = aaData.clim; rawLabels = gridJsonData.metadata.labels_clim; } 
        else if (gridSubMode === 'seas') { rawVals = aaData.seas; rawLabels = gridJsonData.metadata.labels_seas; }
        
        // SUNTIKAN PERBAIKAN: Sinkronisasi Box Plot Area Average dengan filter null
        if (chartMode === 'boxplot' && boxplotJsonData) {
            const bData = boxplotJsonData[currentVar].area_average;
            const rawBox = (gridSubMode === 'ts') ? bData.ts : (gridSubMode === 'clim' ? bData.clim : bData.seas);
            // Hanya simpan data boxplot di mana data utamanya tidak null agar indeks sinkron
            boxplotChartData = rawBox.filter((_, idx) => rawVals[idx] !== null);
        }

        fullChartData = rawLabels.map((lbl, idx) => ({ label: lbl, val: rawVals[idx], originalIdx: idx })).filter(d => d.val !== null);
        resetZoom(); isChartLocked = false; lockedHoverIndex = -1; cvsCombined.classList.remove('chart-locked'); hoverIndex = -1;
        drawAll(); computeAndRenderStats();
        if (currentVar === 'wind' || currentVar === 'swh') { 
            roseLabel.textContent = currentVar === 'wind' ? "WIND ROSE (AREA AVERAGE - DYNAMIC)" : "WAVE ROSE (AREA AVERAGE - DYNAMIC)";
            updateSpatialFrame(0); 
        }
        spatialTimeLabel.textContent = "Area Average Loaded";
        if (compareVar !== 'none') syncSecondaryData(); 
    }

    smBtns.forEach(btn => {
        if (btn.classList.contains('cmp-btn')) return;
        btn.addEventListener('click', () => {
            document.querySelectorAll('#subModeControls .sm-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            gridSubMode = btn.dataset.mode;
            
            if(isChartLocked) { isChartLocked = false; lockedHoverIndex = -1; cvsCombined.classList.remove('chart-locked'); }

            if (is3DMode) {
                if(!is3DGridSelector) loadAreaAverageData();

    function resetZoom() {
        zoomState = { yMin: null, yMax: null, yMinSec: null, yMaxSec: null, xStartIdx: 0, xEndIdx: fullChartData.length - 1, isYManual: false, isYManualSec: false, isXManual: false };
        isZoomingY_Pri = false; isZoomingY_Sec = false; isZoomingX = false;
    }

    wrapper.addEventListener('dblclick', () => { if (fullChartData.length > 0) { resetZoom(); isChartLocked = false; lockedHoverIndex = -1; cvsCombined.classList.remove('chart-locked'); drawAll(); computeAndRenderStats(); } });

    function updateInterfaceLabels() {
        const conf = DATA_SOURCES[currentVar];
        document.documentElement.style.setProperty('--neon-color', conf.color); document.documentElement.style.setProperty('--neon-glow', conf.fillTop);

        compareVar = 'none'; secondaryChartData = []; document.querySelectorAll('.cmp-btn').forEach(b => b.classList.remove('active')); document.querySelector('[data-cmp="none"]').classList.add('active');
    }

    async function loadData() {
        loadingOverlay.textContent = `Memuat Data ${DATA_SOURCES[currentVar].short}...`; loadingOverlay.style.display = 'flex';
        updateInterfaceLabels();
        try {
            const res = await fetch(DATA_SOURCES[currentVar].url); if (!res.ok) throw new Error(); const json = await res.json(); gridJsonData = json;
            
            // SUNTIKAN: Load Boxplot data secara paralel
            if (!boxplotJsonData) {
                const bRes = await fetch('boxplot_data_final.json');

            }

                if(!is3DGridSelector) loadAreaAverageData(); 
                update3DLayer(0);

                updateColorbarImage(); loadAreaAverageData(); 
            } else { 
                setupGridSystem(json); 
                if (currentGridRow === -1) { loadGridDataToChart(Math.floor(json.metadata.latitudes.length / 2), Math.floor(json.metadata.longitudes.length / 2)); } else { loadGridDataToChart(currentGridRow, currentGridCol); } 
            }

            if(json.metadata.bounds) { imageBounds = json.metadata.bounds; spatialOverlay.setBounds(imageBounds); }
            if (!resizeObserver) initChartSystem(); else drawAll(); 
        } catch (e) { console.error(e); alert(`Gagal memuat data ${currentVar}.`); } finally { loadingOverlay.style.display = 'none'; }
    }

    function setupGridSystem(data) {
        if (viewMode === 'spatial' || is3DMode) return; 
        
        gridLayerGroup.clearLayers(); const lats = data.metadata.latitudes; const lons = data.metadata.longitudes; const halfRes = 0.0625;
        gridRects = {}; activeHighlights = [];
        lats.forEach((lat, i) => { lons.forEach((lon, j) => {
                const rect = L.rectangle([[lat - halfRes, lon - halfRes], [lat + halfRes, lon + halfRes]], { color: '#444', weight: 1, fillColor: '#000', fillOpacity: 0.05, className: 'grid-cell-path' }).addTo(gridLayerGroup);
                const key = `${i},${j}`; gridRects[key] = rect;
                rect.on('mouseover', () => handleGridHover(i, j)); rect.on('click', () => handleGridClick(i, j));
        });});
        if (isGridLocked && lockedGridKey) { const [lr, lc] = lockedGridKey.split(',').map(Number); updateGridVisuals(lr, lc); }
    }

    function clearGridHighlights() { activeHighlights.forEach(key => { if (gridRects[key]) gridRects[key].setStyle({ color: '#444', weight: 1, fillColor: '#000', fillOpacity: 0.05, className: 'grid-cell-path' }); }); activeHighlights = []; }
    
    function handleGridHover(r, c) { 
        if (viewMode === 'spatial' || isGridLocked || is3DMode) return; 
        updateGridVisuals(r, c); 
    }
    
    function handleGridClick(r, c) { 
        if (is3DMode) {
             const clickedKey = `${r},${c}`;
             isGridLocked = true; lockedGridKey = clickedKey;
             spatialTimeLabel.textContent = `Grid Selected: [${r}, ${c}] in 3D Mode`;
             update3DLayer(getCurrentTimeIndex());
             loadGridDataToChart(r, c);
             return; 
        }

        if (viewMode === 'spatial') return; 
        const clickedKey = `${r},${c}`; 
        if (isGridLocked && lockedGridKey === clickedKey) { isGridLocked = false; lockedGridKey = null; } 
        else { isGridLocked = true; lockedGridKey = clickedKey; updateGridVisuals(r, c); } 
    }

    function updateGridVisuals(r, c) {
        if(is3DMode) return; 
        clearGridHighlights(); const activeColor = DATA_SOURCES[currentVar].color;
        for (let i = r - 1; i <= r + 1; i++) { for (let j = c - 1; j <= c + 1; j++) {
                const key = `${i},${j}`; if (gridRects[key]) {
                    const isCenter = (i === r && j === c); activeHighlights.push(key); 
                    const layer = gridRects[key];

    function handleMouseMove(e) {

        if (isZoomingY_Pri) {

    function processTooltipHover(e, rect, pad) {

    function handleMouseUp() { if(isZoomingY_Pri || isZoomingY_Sec || isZoomingX) { isZoomingY_Pri = false; isZoomingY_Sec = false; isZoomingX = false; document.body.classList.remove('cursor-ns', 'cursor-ew'); } }

    function drawAll() {
        const dpr = window.devicePixelRatio || 1; const cvs = cvsCombined; const ctx = ctxCombined;
        const w = cvs.width / dpr; const h = cvs.height / dpr; const pad = { t: 20, b: 25, l: 50, r: 50 }; 
        ctx.clearRect(0, 0, w, h); if (fullChartData.length === 0) { ctx.fillStyle = "#555"; ctx.textAlign = "center"; ctx.fillText("DATA TIDAK TERSEDIA", w/2, h/2); return; }
        
        let visibleData = fullChartData.slice(zoomState.xStartIdx, zoomState.xEndIdx + 1);
        let visibleBoxData = [];
        if (chartMode === 'boxplot' && boxplotChartData.length > 0) {
            visibleBoxData = boxplotChartData.slice(zoomState.xStartIdx, zoomState.xEndIdx + 1);
        }

        if (visibleData.length === 0) return;
        
        // Penetapan Skala Y
        if (!zoomState.isYManual) {
            let min, max;
            if (chartMode === 'boxplot' && visibleBoxData.length > 0) {
                min = Math.min(...visibleBoxData.map(d => d[0]));
                max = Math.max(...visibleBoxData.map(d => d[4]));
            } else {
                const vals = visibleData.map(d => d.val);
                min = Math.min(...vals); max = Math.max(...vals);
            }
            let p = (max - min) * 0.1 || 0.5; zoomState.yMin = min - p; zoomState.yMax = max + p;
        }
        const rMin = zoomState.yMin, rMax = zoomState.yMax;

        let visibleSecData = [];

            const sVals = visibleSecData.map(d => d.val);

        // Draw Grids

            ctx.beginPath(); ctx.strokeStyle = THEME.grid; ctx.setLineDash([4, 4]); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
            ctx.fillStyle = DATA_SOURCES[currentVar].color; ctx.textAlign = 'left'; ctx.setLineDash([]); ctx.fillText((rMin + (rMax - rMin) * ratio).toFixed(1), w - pad.r + 5, y + 3);
            if (hasOverlay) { ctx.fillStyle = DATA_SOURCES[compareVar].color; ctx.textAlign = 'right'; ctx.fillText((lMin + (lMax - lMin) * ratio).toFixed(1), pad.l - 8, y + 3); }
        }

            html += `<div style="display:flex; justify-content:space-between;"><span style="color:${conf.color}">MEDIAN:</span><span style="color:${conf.color}; font-weight:bold;">${b[2].toFixed(2)}</span></div>`;
            html += `<div style="display:flex; justify-content:space-between;"><span style="color:#888">Q1:</span><span style="color:#fff">${b[1].toFixed(2)}</span></div>`;
            html += `<div style="display:flex; justify-content:space-between;"><span style="color:#888">MIN:</span><span style="color:#fff">${b[0].toFixed(2)}</span></div>`;
            html += `</div>`;
        } else {
            html += `<div style="display:flex; justify-content:space-between; font-family:monospace; margin-bottom:4px;"><span style="color:${conf.color}">${conf.short}</span><span style="color:#fff">${d.val.toFixed(2)} ${conf.unit}</span></div>`;
            if (compareVar !== 'none' && secondaryChartData[idx]) { const cs = DATA_SOURCES[compareVar]; html += `<div style="display:flex; justify-content:space-between; font-family:monospace"><span style="color:${cs.color}">${cs.short}</span><span style="color:#fff">${secondaryChartData[idx].val.toFixed(2)} ${cs.unit}</span></div>`; }
        }
        tooltip.innerHTML = html;
    }

    function computeAndRenderStats() {
        let visibleData = fullChartData.slice(zoomState.xStartIdx, zoomState.xEndIdx + 1); if (visibleData.length === 0) return;
        
        const conf = DATA_SOURCES[currentVar];
        const vals = visibleData.map(d => d.val); 
        const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
        
        let minVal = Math.min(...vals);
        let maxVal = Math.max(...vals);

        // SUNTIKAN: Jika boxplot, ambil min-max dari whiskers
        if (chartMode === 'boxplot' && boxplotChartData.length > 0) {
            const visibleBox = boxplotChartData.slice(zoomState.xStartIdx, zoomState.xEndIdx + 1);
            minVal = Math.min(...visibleBox.map(b => b[0]));
            maxVal = Math.max(...visibleBox.map(b => b[4]));
        }

        document.getElementById('newStatsBox').innerHTML = `
            <div class="stat-group">
                <span class="sg-title">${conf.label}</span>
                <div class="sg-row"><span class="sg-label">Domain Mean</span> <span class="sg-val">${mean.toFixed(2)}</span></div>
                <div class="sg-row"><span class="sg-label">Domain Min</span> <span class="sg-val">${minVal.toFixed(2)}</span></div>
                <div class="sg-row"><span class="sg-label">Domain Max</span> <span class="sg-val">${maxVal.toFixed(2)}</span></div>
            </div>`;
    }

    if (typeof d3 === 'undefined') { window.d3 = { easeCubicOut: function(t) { return --t * t * t + 1; } }; }

    loadData();
</script>
</body>
</html>
